name: CI - Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore TaskManager.Api.slnx

      - name: Build
        run: dotnet build TaskManager.Api.slnx --no-restore --configuration Release

      - name: Run tests
        run: dotnet test TaskManager.Api.slnx --no-build --configuration Release --verbosity normal
